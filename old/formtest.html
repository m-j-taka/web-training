<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マラソン申し込みフォーム</title>
</head>

<body>
    <h1>マラソン申し込みフォーム</h1>
    <form action="">
        <div>
            <label for="familyname">姓</label>
            <input type="text" id="familyname" name="familyname" required>
            <label for="firstname">名</label>
            <input type="text" id="firstname" name="firstname" required>
        </div>

        <p>参加するマラソンを選択：</p>
        <div>
            <label for="5km">楽しく走ろう5km</label>
            <input type="radio" name="choise" id="5km" value="5km">
        </div>
        <div>
            <label for="half">ハーフマラソン</label>
            <input type="radio" name="choise" id="half" value="half">
        </div>
        <div>
            <label for="full">フルマラソン</label>
            <input type="radio" name="choise" id="full" value="full">
        </div>
        <div>
            <label for="mail">メールアドレス</label>
            <input type="email" name="mail" id="mail" required>
            <label for="password">パスワード</label>
            <input type="password" name="password" id="password" required>
        </div>
        <div>
            <label for="age">参加する年代</label>
            <select name="age" id="age">
                <option value="-18" selected>-18</option>
                <option value="18-30">18-30</option>
                <option value="30-50">30-50</option>
                <option value="50+">50+</option>
            </select>
        </div>
            <button>登録する</button>
        
    </form>
</body>

</html>
